services:
  backend:
    build:
      context: ./backend
    container_name: dashboard-backend
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      - PORT=3100
      - ARGOCD_API_URL=https://argocd.wellness.local/api/v1
      - ARGOCD_TOKEN=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJhcmdvY2QiLCJzdWIiOiJhZG1pbjphcGlLZXkiLCJuYmYiOjE3ODAzOTM2MDUsImlhdCI6MTc4MDM5MzYwNSwianRpIjoiY2VmMmJmNGYtZDM0ZC00N2JjLWEzMGEtMDY3YTkzYTAwMTk1In0.zvtWjEmc5WJaAnSBFBIcryHINAHGd9fyPl3eZIXQtYM
      - ARGOCD_CA_CERT_PATH=/app/wellness-ca.crt
      - PROMETHEUS_URL=http://host.docker.internal:9090
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /home/ubuntu/.kube/config:/root/.kube/config:ro
    networks:
      - dashboard

  frontend:
    build:
      context: ./frontend
    container_name: dashboard-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - dashboard

networks:
  dashboard:
    driver: bridge
