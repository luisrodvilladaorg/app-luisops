apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-luisops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/luisrodvilladaorg/app-luisops
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: dashboard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
