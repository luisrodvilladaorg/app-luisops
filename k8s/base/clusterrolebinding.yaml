apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dashboard-read-only-binding
  labels:
    app: luisops-dashboard
subjects:
  - kind: ServiceAccount
    name: dashboard-reader
    namespace: dashboard
roleRef:
  kind: ClusterRole
  name: dashboard-read-only
  apiGroup: rbac.authorization.k8s.io